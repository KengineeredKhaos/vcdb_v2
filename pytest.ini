[pytest]
# Only collect from our test folder
testpaths = tests

# Keep recursion out of the venv and other junk
norecursedirs =
    .*  __pycache__  build  dist  node_modules
    venv  .venv  env  .env
    bin  include  share  lib  # <- your in-repo venv dirs
    app/logs  var  exports  wheelhouse tests_legacy

# Be explicit about file naming so nothing “cute” gets picked up
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Same nice flags you had
addopts = -q -ra

# pytest_randomly
randomly_order = true
randomly_seed = 1337

# Tests run against a file-backed SQLite DB at app/instance/test.db
# (see config.TestConfig and tests/conftest.py).
# To inspect failures, open that file with sqlitebrowser.

markers =
    flow: end-to-end decision branch tests
    contracts: contract GETs (read-only)

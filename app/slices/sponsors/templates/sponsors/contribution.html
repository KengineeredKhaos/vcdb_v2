{% extends "layout/base.html" %}
{% block content %}
<h1>Record Contribution</h1>
<form method="post" action="{{ url_for('sponsors.contribution_submit') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div>
    <label>Sponsor ID</label>
    <input name="sponsor_id" required placeholder="01H...ULID">
  </div>
  <div>
    <label>Amount (cents)</label>
    <input name="amount_cents" required pattern="^\d+$" placeholder="1000">
  </div>
  <div>
    <label>Kind</label>
    <input name="kind" placeholder="cash / in_kind" value="cash">
  </div>
  <div>
    <label>Fiscal Year (optional)</label>
    <input name="fiscal_year" placeholder="2025">
  </div>
  <div>
    <label>Valuation Basis (optional)</label>
    <input name="valuation_basis" placeholder="receipt, fair_market_value">
  </div>
  <div>
    <label>Related Event ID (optional)</label>
    <input name="event_id" placeholder="01H...ULID">
  </div>
  <button type="submit">Record</button>
</form>
{% endblock %}

{% extends "layout/base.html" %}
{# templates/macros.html #}
{% macro csrf_field() -%}
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
{%- endmacro %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1>Edit Funding Demand</h1>

<form method="post"> {{ csrf_field() }}
  {% include "calendar/funding/_form.html" %}
  <button type="submit">Save changes</button>
</form>

<p>
  <a href="{{ url_for('calendar.funding_demand_detail', ulid=demand.funding_demand_ulid) }}">
    Back to detail
  </a>
</p>
{% endblock %}

{% extends "layout/base.html" %}
{# templates/macros.html #}
{% macro csrf_field() -%}
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
{%- endmacro %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1>New Funding Demand</h1>

<form method="post">
  {{ csrf_field() }}
  {% include "calendar/funding/_form.html" %}
  <button type="submit">Create funding demand</button>
</form>
{% endblock %}

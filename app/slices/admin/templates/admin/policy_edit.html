{% extends "layout/base.html" %}
{% block content %}
<h1>Edit Policy</h1>
<form method="post" action="{{ url_for('admin.policy_save') }}">
  <input type="hidden" name="policy_path" value="{{ policy_path }}">
  <div class="mb-2">
    <textarea name="raw" rows="24" class="form-control" spellcheck="false">{{ raw }}</textarea>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-primary">Save</button>
    <button class="btn btn-secondary" id="btn-validate" type="button">Validate</button>
    <a class="btn btn-light" href="{{ url_for('admin.policy_index') }}">Back</a>
  </div>
</form>

<script>
document.getElementById('btn-validate').addEventListener('click', async () => {
  const ta = document.querySelector('textarea[name="raw"]');
  const policy_path = document.querySelector('input[name="policy_path"]').value;
  const resp = await fetch('{{ url_for("admin.policy_validate") }}', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({policy_path, raw: ta.value})
  });
  const data = await resp.json();
  let msg = data.ok ? 'OK' : 'ERRORS:\n- ' + data.errors.join('\n- ');
  if ((data.hints || []).length) msg += '\n\nHINTS:\n- ' + data.hints.join('\n- ');
  alert(msg);
});
</script>
{% endblock %}

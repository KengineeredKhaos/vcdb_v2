{% extends "layout/base.html" %}
{% block content %}
<h1>Policies</h1>
<table class="table">
  <tr><th>Area</th><th>File</th><th></th></tr>
  {% for it in items %}
  <tr>
    <td>{{ it.area }}</td>
    <td>{{ it.name }}</td>
    <td><a class="btn btn-sm btn-primary" href="{{ url_for('admin.policy_edit', path=it.path) }}">Edit</a></td>
  </tr>
  {% endfor %}
</table>
{% endblock %}

<h1>Adjust Roles for {{ subject_id }}</h1>
<form method="post">
  <label>Add (multi-select):</label>
  <select name="add" multiple>
    {% for c in choices %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
  </select>
  <label>Remove (multi-select):</label>
  <select name="remove" multiple>
    {% for c in choices %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
  </select>
  <label><input type="checkbox" name="dry_run" value="true" checked> Dry run</label>
  <button type="submit">Apply</button>
</form>
